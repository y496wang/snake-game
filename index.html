<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      color: #39ff14;
    }

    #wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #score-bar {
      width: 600px;
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.8;
    }

    canvas {
      border: 2px solid #39ff14;
      box-shadow: 0 0 20px #39ff14, 0 0 60px #39ff1430;
      display: block;
    }

    #overlay {
      position: absolute;
      width: 600px;
      height: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: rgba(0, 0, 0, 0.82);
      pointer-events: none;
    }

    #overlay h1 {
      font-size: 64px;
      letter-spacing: 8px;
      text-shadow: 0 0 20px #39ff14, 0 0 40px #39ff14;
      text-transform: uppercase;
    }

    #overlay .subtitle {
      font-size: 13px;
      letter-spacing: 4px;
      opacity: 0.7;
      text-transform: uppercase;
    }

    #overlay .final-score {
      font-size: 22px;
      letter-spacing: 4px;
    }

    #overlay .prompt {
      font-size: 13px;
      letter-spacing: 3px;
      opacity: 0.6;
      animation: blink 1.2s step-start infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    #instructions {
      width: 600px;
      text-align: center;
      font-size: 11px;
      letter-spacing: 2px;
      opacity: 0.4;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div id="wrapper">
    <div id="score-bar">
      <span>Score: <span id="score">0</span></span>
      <span>Best: <span id="best">0</span></span>
    </div>
    <div style="position:relative;">
      <canvas id="canvas" width="600" height="600"></canvas>
      <div id="overlay">
        <h1>Snake</h1>
        <div class="subtitle">Classic arcade</div>
        <div class="prompt">Press Space or Enter to start</div>
      </div>
    </div>
    <div id="instructions">Arrow keys or WASD to move &nbsp;·&nbsp; P to pause</div>
  </div>

  <script>
    const COLS = 30, ROWS = 30;
    const CELL = 600 / COLS;
    const TICK_BASE = 120;
    const SPEED_INCREMENT = 3;
    const GOLDEN_CHANCE = 0.3;
    const GOLDEN_DURATION = 8000;

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');

    const NEON = '#39ff14';
    const NEON_DIM = '#1a7a09';
    const FOOD_COLOR = '#ff3939';
    const BG = '#0a0a0a';
    const GRID_COLOR = '#111';

    let snake, dir, nextDir, food, goldenFood, goldenExpireAt;
    let score, best, state, loop, tickMs;
    // state: 'start' | 'playing' | 'paused' | 'dead'

    best = parseInt(localStorage.getItem('snake-best') || '0');
    bestEl.textContent = best;

    function init() {
      snake = [
        { x: 15, y: 15 },
        { x: 14, y: 15 },
        { x: 13, y: 15 },
      ];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      tickMs = TICK_BASE;
      goldenFood = null;
      goldenExpireAt = 0;
      scoreEl.textContent = 0;
      placeFood();
    }

    function occupiedSet(excludeGolden) {
      const set = new Set(snake.map(s => `${s.x},${s.y}`));
      set.add(`${food.x},${food.y}`);
      if (!excludeGolden && goldenFood) set.add(`${goldenFood.x},${goldenFood.y}`);
      return set;
    }

    function placeFood() {
      const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
      if (goldenFood) occupied.add(`${goldenFood.x},${goldenFood.y}`);
      let pos;
      do {
        pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      } while (occupied.has(`${pos.x},${pos.y}`));
      food = pos;
    }

    function placeGoldenFood() {
      const occupied = occupiedSet(true);
      let pos;
      do {
        pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      } while (occupied.has(`${pos.x},${pos.y}`));
      goldenFood = pos;
      goldenExpireAt = Date.now() + GOLDEN_DURATION;
    }

    function updateBest() {
      if (score > best) {
        best = score;
        bestEl.textContent = best;
        localStorage.setItem('snake-best', best);
      }
    }

    function tick() {
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return die();
      if (snake.some(s => s.x === head.x && s.y === head.y)) return die();

      snake.unshift(head);

      if (goldenFood && Date.now() > goldenExpireAt) goldenFood = null;

      let ate = false;

      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = score;
        updateBest();
        tickMs = Math.max(60, TICK_BASE - score * SPEED_INCREMENT);
        placeFood();
        if (!goldenFood && Math.random() < GOLDEN_CHANCE) placeGoldenFood();
        ate = true;
      } else if (goldenFood && head.x === goldenFood.x && head.y === goldenFood.y) {
        score += 5;
        scoreEl.textContent = score;
        updateBest();
        goldenFood = null;
        ate = true;
      }

      if (!ate) snake.pop();
      scheduleNext();
    }

    function scheduleNext() {
      clearTimeout(loop);
      loop = setTimeout(tick, tickMs);
    }

    function die() {
      state = 'dead';
      clearTimeout(loop);
      showOverlay('dead');
    }

    function draw(t) {
      ctx.fillStyle = BG;
      ctx.fillRect(0, 0, 600, 600);

      // Grid
      ctx.strokeStyle = GRID_COLOR;
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, 600); ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(600, y * CELL); ctx.stroke();
      }

      // Regular food
      const fx = food.x * CELL, fy = food.y * CELL;
      ctx.shadowBlur = 14;
      ctx.shadowColor = FOOD_COLOR;
      ctx.fillStyle = FOOD_COLOR;
      ctx.beginPath();
      ctx.arc(fx + CELL / 2, fy + CELL / 2, CELL / 2 - 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Golden apple
      if (goldenFood) drawGoldenFood(t);

      // Snake
      snake.forEach((seg, i) => {
        const px = seg.x * CELL + 1, py = seg.y * CELL + 1;
        const size = CELL - 2;
        ctx.shadowBlur = i === 0 ? 18 : 6;
        ctx.shadowColor = NEON;
        ctx.fillStyle = i % 2 === 0 ? NEON : NEON_DIM;
        ctx.fillRect(px, py, size, size);
      });
      ctx.shadowBlur = 0;

      drawEyes();
    }

    function drawGoldenFood(t) {
      const cx = goldenFood.x * CELL + CELL / 2;
      const cy = goldenFood.y * CELL + CELL / 2;
      const r = CELL / 2 - 1;

      // Pulsing glow
      const pulse = 0.5 + 0.5 * Math.sin(t * 0.005);
      ctx.shadowBlur = 20 + 14 * pulse;
      ctx.shadowColor = '#ffd700';

      // Radial gradient body
      const grad = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, r * 0.05, cx, cy, r * 0.9);
      grad.addColorStop(0, '#fffde0');
      grad.addColorStop(0.45, '#ffd700');
      grad.addColorStop(1, '#b8860b');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(cx, cy, r * 0.82, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Rotating 4-pointed sparkles
      const rot = t * 0.0022;
      for (let i = 0; i < 6; i++) {
        const a = rot + (i / 6) * Math.PI * 2;
        const dist = r + 5 + 2 * Math.sin(t * 0.004 + i * 1.1);
        const sx = cx + Math.cos(a) * dist;
        const sy = cy + Math.sin(a) * dist;
        const sz = 1.6 + 1.2 * Math.abs(Math.sin(t * 0.005 + i * 0.9));

        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(a + t * 0.003);
        ctx.shadowBlur = 8;
        ctx.shadowColor = '#ffd700';
        ctx.fillStyle = '#fff8a0';
        ctx.beginPath();
        ctx.moveTo(0, -sz * 2.2);
        ctx.lineTo(sz * 0.45, -sz * 0.45);
        ctx.lineTo(sz * 2.2, 0);
        ctx.lineTo(sz * 0.45, sz * 0.45);
        ctx.lineTo(0, sz * 2.2);
        ctx.lineTo(-sz * 0.45, sz * 0.45);
        ctx.lineTo(-sz * 2.2, 0);
        ctx.lineTo(-sz * 0.45, -sz * 0.45);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
      ctx.shadowBlur = 0;

      // Countdown ring — shrinks as time runs out
      const remaining = Math.max(0, goldenExpireAt - Date.now()) / GOLDEN_DURATION;
      ctx.strokeStyle = `rgba(255, 215, 0, ${0.35 + 0.25 * pulse})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(cx, cy, r + 10, -Math.PI / 2, -Math.PI / 2 + remaining * Math.PI * 2);
      ctx.stroke();
    }

    function drawEyes() {
      const head = snake[0];
      const cx = head.x * CELL + CELL / 2;
      const cy = head.y * CELL + CELL / 2;
      const r = CELL * 0.12;
      const offset = CELL * 0.22;

      let ex1, ey1, ex2, ey2;
      if (dir.x === 1)       { ex1 = cx + offset; ey1 = cy - offset; ex2 = cx + offset; ey2 = cy + offset; }
      else if (dir.x === -1) { ex1 = cx - offset; ey1 = cy - offset; ex2 = cx - offset; ey2 = cy + offset; }
      else if (dir.y === -1) { ex1 = cx - offset; ey1 = cy - offset; ex2 = cx + offset; ey2 = cy - offset; }
      else                   { ex1 = cx - offset; ey1 = cy + offset; ex2 = cx + offset; ey2 = cy + offset; }

      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(ex1, ey1, r, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex2, ey2, r, 0, Math.PI * 2); ctx.fill();
    }

    function showOverlay(type) {
      overlay.innerHTML = '';
      overlay.style.display = 'flex';

      if (type === 'start') {
        overlay.innerHTML = `
          <h1>Snake</h1>
          <div class="subtitle">Classic arcade</div>
          <div class="subtitle" style="font-size:11px; opacity:0.5">Golden apple = 5 pts &nbsp;·&nbsp; disappears after 8s</div>
          <div class="prompt">Press Space or Enter to start</div>`;
      } else if (type === 'paused') {
        overlay.innerHTML = `
          <h1 style="font-size:48px">Paused</h1>
          <div class="prompt">Press P or Space to resume</div>`;
      } else if (type === 'dead') {
        overlay.innerHTML = `
          <h1 style="font-size:48px; color:#ff3939; text-shadow: 0 0 20px #ff3939">Game Over</h1>
          <div class="final-score">Score: ${score}</div>
          ${score === best && score > 0 ? '<div class="subtitle" style="color:#ffd700">New Best!</div>' : ''}
          <div class="prompt">Press Space or Enter to restart</div>`;
      }
    }

    function hideOverlay() {
      overlay.style.display = 'none';
    }

    function startGame() {
      init();
      state = 'playing';
      hideOverlay();
      scheduleNext();
    }

    // RAF render loop — runs at 60fps for smooth sparkle animation
    function renderLoop(t) {
      draw(t);
      requestAnimationFrame(renderLoop);
    }
    requestAnimationFrame(renderLoop);

    // Input
    const KEY_MAP = {
      ArrowUp: { x: 0, y: -1 }, w: { x: 0, y: -1 }, W: { x: 0, y: -1 },
      ArrowDown: { x: 0, y: 1 }, s: { x: 0, y: 1 }, S: { x: 0, y: 1 },
      ArrowLeft: { x: -1, y: 0 }, a: { x: -1, y: 0 }, A: { x: -1, y: 0 },
      ArrowRight: { x: 1, y: 0 }, d: { x: 1, y: 0 }, D: { x: 1, y: 0 },
    };

    document.addEventListener('keydown', e => {
      if (e.key === ' ' || e.key === 'Enter') {
        if (state === 'start' || state === 'dead') startGame();
        else if (state === 'paused') { state = 'playing'; hideOverlay(); scheduleNext(); }
        e.preventDefault();
        return;
      }

      if (e.key === 'p' || e.key === 'P') {
        if (state === 'playing') {
          state = 'paused';
          clearTimeout(loop);
          showOverlay('paused');
        } else if (state === 'paused') {
          state = 'playing';
          hideOverlay();
          scheduleNext();
        }
        return;
      }

      const newDir = KEY_MAP[e.key];
      if (newDir && state === 'playing') {
        if (newDir.x === -dir.x && newDir.y === -dir.y) return;
        nextDir = newDir;
        e.preventDefault();
      }
    });

    // Init start screen
    state = 'start';
    init();
    showOverlay('start');
  </script>
</body>
</html>
